<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tongan Goods</title>

    <style>
    body {
      background-color: rgba(0, 140, 255, 0.445);
    }
    </style>
</head>

<body onload="start()">

    <h1>Food Section</h1>

    <p>Sapasui - $10 <button onclick="addSpecificItem('Sapasui')">Add to Cart</button></p>

    <p>Pani Popo - $8 <button onclick="addSpecificItem('Pani Popo')">Add to Cart</button></p>

    <p>Palusami - $12 <button onclick="addSpecificItem('Palusami')">Add to Cart</button></p>

    <p>Ota Ika - $10 <button onclick="addSpecificItem('Ota Ika')">Add to Cart</button></p>

    <h1>Drinks Section</h1>

    <p>Otai - $17 <button onclick="addSpecificItem('Otai')">Add to Cart</button></p>

    <p>Coconut Water - $10 <button onclick="addSpecificItem('Coconut Water')">Add to Cart</button></p>

    <p>Chocolate Milkshake - $6 <button onclick="addSpecificItem('Chocolate Milkshake')">Add to Cart</button></p>

    <p>Strawberry Milkshake - $6 <button onclick="addSpecificItem('Strawberry Milkshake')">Add to Cart</button></p>

    <p>Monster - $8 <button onclick="addSpecificItem('Monster')">Add to Cart</button></p>

    <h2>Add Your Own Item</h2>

    <input id="itemInput" type="text" placeholder="Enter an item">

    <button onclick="addItem()">Add Item</button>

    <br><br>

    <button onclick="showList()">Show Order</button>
    <button onclick="clearOrder()">Clear Order</button>
    <button onclick="pay()">Pay</button>

    <br><br>

    <div id="spaceForJavaScriptOutput">
        Your order will appear here.
    </div>

    <script src="script.js"></script>

</body>
</html>
